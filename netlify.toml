[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # script-src:  unsafe-eval for qrcode.react canvas generation
    #              unsafe-inline for Vite's injected style/init scripts
    # worker-src:  blob: required for Sentry session replay worker
    #              and Supabase realtime websocket worker
    # connect-src: Supabase REST + realtime websocket + Sentry ingest
    # style-src:   Google Fonts
    # font-src:    Google Fonts
    # img-src:     data: for QR code SVG inline, blob: for canvas exports
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; worker-src blob: 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.sentry.io https://sentry.io; frame-src 'none'; object-src 'none';"
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"